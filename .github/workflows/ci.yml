name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Backend/package-lock.json

      - name: Install dependencies
        run: npm run install-all

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Full test suite requires a local MySQL database with migrations applied.
      # Run `npm test` after configuring .env and importing Backend/migrations/.
