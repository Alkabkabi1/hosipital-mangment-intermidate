<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/unified-form-styles.css">
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🏥</text></svg>">
  <title>مستشفى الملك عبدالعزيز – مكافأة نهاية خدمة</title>

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2B6CB0;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --field-bg: #ffffff;
      --field-text: #0f172a;
      --field-border: #000000;
      --field-placeholder: #6b7280;
      --field-focus: rgba(0, 0, 0, .15);
      --qbox-radius: 16px;
      --qbox-border: #e5e7eb;
      --qbox-shadow: 0 6px 18px rgba(0, 0, 0, .06);
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', system-ui, Segoe UI, Arial, sans-serif;
    }

    a { color: inherit; text-decoration: none }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 0
    }

    .header .in {
      max-width: 1200px;
      margin: auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .brand img {
      width: 36px;
      height: 36px;
      object-fit: contain
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .brand small {
      color: var(--muted);
      display: block;
      margin-top: 2px
    }

    .back {
      margin-right: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600
    }

    .back:hover {
      background: #f9fafb
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 16px
    }

    .form-section {
      background: var(--surface);
      border: 1px solid var(--qbox-border);
      border-radius: var(--qbox-radius);
      box-shadow: var(--qbox-shadow);
      padding: 24px;
      margin-bottom: 20px
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 16px 0;
      color: var(--primary)
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px
    }

    .form-grid.single {
      grid-template-columns: 1fr
    }

    .form-group {
      display: flex;
      flex-direction: column
    }

    .form-group.full {
      grid-column: 1 / -1
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text)
    }

    .input,
    .select,
    .textarea {
      background: var(--field-bg);
      border: 2px solid var(--field-border);
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      color: var(--field-text);
      font-family: 'Tajawal', system-ui;
      transition: border-color 0.2s, box-shadow 0.2s
    }

    .textarea {
      min-height: 100px;
      resize: vertical
    }

    .input::placeholder,
    .textarea::placeholder {
      color: var(--field-placeholder)
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #000;
      box-shadow: 0 0 0 3px var(--field-focus);
      outline: none
    }

    .checkbox-group {
      display: grid;
      gap: 12px;
      margin: 16px 0
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      cursor: pointer
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer
    }

    .radio-group {
      display: flex;
      gap: 20px;
      align-items: center
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 24px
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff
    }

    .btn-primary:hover {
      background: #1e40af
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary)
    }

    .btn-outline:hover {
      background: var(--primary);
      color: #fff
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr
      }
      
      .actions {
        flex-direction: column
      }

      .btn {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <!-- هيدر -->
  <header class="header">
    <div class="in">
      <div class="brand">
        <img src="public/image.png" alt="شعار">
        <div>
          <h1>مستشفى الملك عبدالعزيز</h1>
          <small>مكافأة نهاية خدمة / تعويض إجازات</small>
        </div>
      </div>
      <button class="back" data-action="go-back">رجوع</button>
    </div>
  </header>

  <!-- المحتوى -->
  <main class="container">
    <!-- نوع الطلب -->
    <section class="form-section">
      <h2 class="section-title">💰 نوع الطلب</h2>
      <div class="checkbox-group">
        <label>
          <input type="checkbox" id="optEndService">
          <span>مكافأة نهاية الخدمة</span>
        </label>
        <label>
          <input type="checkbox" id="optVacationRefund">
          <span>تعويض عن الإجازات</span>
        </label>
      </div>
    </section>

    <!-- بيانات الموظف -->
    <section class="form-section">
      <h2 class="section-title">👤 بيانات الموظف</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>الاسم *</label>
          <input class="input" id="name" placeholder="الاسم الكامل" required>
        </div>
        <div class="form-group">
          <label>الجنسية *</label>
          <input class="input" id="nationality" placeholder="مثال: سعودي" required>
        </div>
        <div class="form-group">
          <label>المسمى الوظيفي *</label>
          <input class="input" id="position" placeholder="المسمى الوظيفي" required>
        </div>
        <div class="form-group">
          <label>نوع العقد *</label>
          <select class="select" id="contractType" required>
            <option value="">-- اختر --</option>
            <option value="خدمة مدنية">خدمة مدنية</option>
            <option value="تشغيل ذاتي">تشغيل ذاتي</option>
            <option value="عقد مؤقت">عقد مؤقت</option>
          </select>
        </div>
        <div class="form-group">
          <label>الرقم الوظيفي *</label>
          <input class="input" id="jobNo" placeholder="أرقام فقط" data-ltr required>
        </div>
        <div class="form-group">
          <label>رقم السجل *</label>
          <input class="input" id="recordNo" placeholder="أرقام فقط" data-ltr required>
        </div>
        <div class="form-group">
          <label>القسم *</label>
          <input class="input" id="department" placeholder="القسم" required>
        </div>
      </div>
    </section>

    <!-- فترة العمل -->
    <section class="form-section">
      <h2 class="section-title">📅 فترة العمل</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>تاريخ بدء العمل *</label>
          <input class="input" id="workStart" type="date" required>
        </div>
        <div class="form-group">
          <label>تاريخ انتهاء العقد *</label>
          <input class="input" id="contractEnd" type="date" required>
        </div>
        <div class="form-group full">
          <label>تاريخ الطلب *</label>
          <input class="input" id="requestDate" type="date" required>
        </div>
      </div>
    </section>

    <!-- توقيع الموظف -->
    <section class="form-section">
      <h2 class="section-title">✍️ توقيع الموظف</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>التوقيع</label>
          <input class="input" id="employeeSignature" placeholder="اسم الموقع">
        </div>
        <div class="form-group">
          <label>التاريخ</label>
          <input class="input" id="employeeSignDate" type="date">
        </div>
      </div>
    </section>

    <!-- قرار الموارد البشرية -->
    <section class="form-section">
      <h2 class="section-title">✅ قرار الموارد البشرية</h2>
      <div class="form-group">
        <label style="font-weight: 600; margin-bottom: 10px;">قرار الموظف</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="employeeDecision" value="eligible" checked>
            <span>مستحق</span>
          </label>
          <label>
            <input type="radio" name="employeeDecision" value="not_eligible">
            <span>غير مستحق</span>
          </label>
        </div>
      </div>

      <div class="form-group" style="margin-top: 16px;">
        <label style="font-weight: 600; margin-bottom: 10px;">قرار الموارد البشرية</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="hrDecision" value="eligible" checked>
            <span>مستحق</span>
          </label>
          <label>
            <input type="radio" name="hrDecision" value="not_eligible">
            <span>غير مستحق</span>
          </label>
        </div>
      </div>

      <div class="form-group" style="margin-top: 16px;">
        <label>سبب عدم الاستحقاق (إن وجد)</label>
        <textarea class="textarea" id="nonEligibilityReason" placeholder="اذكر السبب إذا كان غير مستحق"></textarea>
      </div>
    </section>

    <!-- أزرار الإجراءات -->
    <div class="actions">
      <button type="button" class="btn btn-primary" id="submitBtn">
        📤 تقديم الطلب
      </button>
      <button type="button" class="btn btn-outline" onclick="window.location.href='employee-dashboard.html'">
        ❌ إلغاء
      </button>
    </div>
  </main>

<!-- Phase 1: Foundation -->
<script src="../jS/dependency-guard.js"></script>
<script src="../jS/error-handler.js"></script>
<script src="../jS/notification-store.js"></script>
<script src="../jS/notification-utils.js"></script>

<!-- Phase 2: Core -->
<script src="../jS/app-init.js"></script>
<script src="../jS/api-client.js"></script>
<script src="../jS/role-permissions.js"></script>

<!-- Phase 3: Form Script -->
<script src="../jS/employee-reward-refund.js"></script>

<script>
window.waitForDependencies(() => {
  console.log('✅ Initializing reward/refund form...');
  
  // Auto-populate today's date
  const today = new Date().toISOString().split('T')[0];
  const requestDateField = document.getElementById('requestDate');
  if (requestDateField && !requestDateField.value) {
    requestDateField.value = today;
  }

  // Initialize the form class
  if (typeof RewardRefundRequest !== 'undefined') {
    new RewardRefundRequest();
  }
}, ['apiClient', 'NotificationUtils']);
</script>

<script src="../jS/signature.js"></script>
</body>
</html>
