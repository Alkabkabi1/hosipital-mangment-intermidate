<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hospital Logo - Blue Medical Cross -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B6CB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#blueGradient)"/>
  
  <!-- Medical cross (white) -->
  <rect x="42" y="25" width="16" height="50" fill="white" rx="4"/>
  <rect x="25" y="42" width="50" height="16" fill="white" rx="4"/>
  
  <!-- Small accent circle -->
  <circle cx="70" cy="30" r="6" fill="#10b981" opacity="0.8"/>
</svg>

