<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🏥</text></svg>">
    <title>طلبات إنهاء العمل – مستشفى الملك عبدالعزيز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/base.css">

    <style>
        :root{
            --primary:#2B6CB0; --primary-600:#255b92;
            --bg:#f5f6f8; --surface:#fff; --text:#0f172a; --muted:#64748b;
            --border:#e5e7eb; --ok:#16a34a; --danger:#dc2626;
        }
        *{box-sizing:border-box}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',system-ui,Segoe UI,Arial}
        
        .header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--border);padding:16px}
        .container{max-width:1000px;margin:20px auto;padding:0 16px}
        
        .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        
        .request-item{border-bottom:1px solid var(--border);padding:20px 0}
        .request-item:last-child{border-bottom:none}
        
        .status-badge{
            display:inline-block;
            padding:6px 12px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }
        .status-submitted{background:#fef3c7;color:#92400e}
        .status-approved{background:#d1fae5;color:#065f46}
        .status-rejected{background:#fee2e2;color:#991b1b}
        
        .btn{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
            font-size:14px;
        }
        .btn-primary{background:var(--primary);color:white}
        .btn-secondary{background:#f1f5f9;color:var(--text)}
        .btn:hover{opacity:0.9}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        
        @media print {
            .no-print{display:none}
            .certificate-print{display:block !important}
        }
    </style>
</head>
<body>

<div class="header no-print">
    <div style="max-width:1000px;margin:auto;display:flex;justify-content:space-between;align-items:center">
        <h1 style="margin:0;font-size:20px">طلبات إنهاء العمل</h1>
        <button class="btn btn-secondary" onclick="window.location.href='employee-dashboard.html'">عودة للوحة التحكم</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2 style="margin-top:0">طلباتي</h2>
        <div id="requestsList">
            <p style="text-align:center;color:var(--muted);padding:40px">جاري التحميل...</p>
        </div>
    </div>
</div>

<!-- Print Certificate Template -->
<div id="certificatePrint" class="certificate-print" style="display:none"></div>

<script>
class MyExitRequests {
    constructor() {
        this.requests = [];
        this.init();
    }
    
    async init() {
        await this.loadRequests();
        this.renderRequests();
    }
    
    async loadRequests() {
        try {
            const authToken = localStorage.getItem('authToken');
            if (!authToken) {
                window.location.href = 'login.html';
                return;
            }
            
            const response = await fetch('http://localhost:3037/api/exit-request', {
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) throw new Error('فشل تحميل الطلبات');
            
            const result = await response.json();
            this.requests = result.data || result || [];
            console.log('Loaded requests:', this.requests);
            
        } catch (error) {
            console.error('Error loading requests:', error);
            document.getElementById('requestsList').innerHTML = `
                <p style="text-align:center;color:#ef4444;padding:20px">
                    حدث خطأ في تحميل الطلبات<br>
                    <small>${error.message}</small>
                </p>
            `;
        }
    }
    
    renderRequests() {
        const container = document.getElementById('requestsList');
        
        if (this.requests.length === 0) {
            container.innerHTML = `
                <p style="text-align:center;color:var(--muted);padding:40px">
                    لا توجد طلبات إنهاء عمل
                </p>
            `;
            return;
        }
        
        container.innerHTML = this.requests.map((req, index) => `
            <div class="request-item">
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:15px">
                    <div>
                        <h3 style="margin:0 0 8px 0">طلب رقم ${req.id}</h3>
                        <p style="margin:0;color:var(--muted);font-size:14px">
                            تاريخ التقديم: ${this.formatDate(req.created_at || req.submitted_at)}
                        </p>
                    </div>
                    <span class="status-badge status-${req.status}">
                        ${this.getStatusText(req.status)}
                    </span>
                </div>
                
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;font-size:14px">
                    <div><strong>الاسم:</strong> ${req.employee_name}</div>
                    <div><strong>الوظيفة:</strong> ${req.job_title}</div>
                    <div><strong>القسم:</strong> ${req.department}</div>
                    <div><strong>رقم الموظف:</strong> ${req.employee_number || 'غير محدد'}</div>
                </div>
                
                <div style="display:flex;gap:10px;margin-top:15px">
                    <button class="btn btn-primary" onclick="app.viewRequest(${index})" ${req.status !== 'approved' ? 'disabled' : ''}>
                        ${req.status === 'approved' ? '📄 عرض وطباعة الشهادة' : '⏳ في انتظار الموافقة'}
                    </button>
                    <button class="btn btn-secondary" onclick="app.viewDetails(${index})">
                        👁️ عرض التفاصيل
                    </button>
                </div>
            </div>
        `).join('');
    }
    
    formatDate(dateString) {
        if (!dateString) return 'غير محدد';
        try {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA');
        } catch (e) {
            return 'غير محدد';
        }
    }
    
    getStatusText(status) {
        const statusMap = {
            'submitted': 'مقدمة',
            'approved': 'معتمدة',
            'rejected': 'مرفوضة'
        };
        return statusMap[status] || status;
    }
    
    async viewRequest(index) {
        const req = this.requests[index];
        if (req.status !== 'approved') {
            alert('لا يمكن طباعة الشهادة قبل الموافقة على الطلب');
            return;
        }
        
        // Generate certificate
        const cert = document.getElementById('certificatePrint');
        cert.innerHTML = `
            <div style="max-width:800px;margin:auto;padding:40px;font-family:'Tajawal',Arial">
                <div style="text-align:center;margin-bottom:30px">
                    <h1 style="color:#2B6CB0;margin:0 0 10px 0">مستشفى الملك عبدالعزيز</h1>
                    <h2 style="margin:0">شهادة إنهاء عمل</h2>
                </div>
                
                <div style="margin:30px 0;line-height:2">
                    <p><strong>اسم الموظف:</strong> ${req.employee_name}</p>
                    <p><strong>رقم الموظف:</strong> ${req.employee_number}</p>
                    <p><strong>رقم الهوية:</strong> ${req.employee_id_number}</p>
                    <p><strong>الوظيفة:</strong> ${req.job_title}</p>
                    <p><strong>القسم:</strong> ${req.department}</p>
                    <p><strong>المدير المباشر:</strong> ${req.supervisor_name || 'غير محدد'}</p>
                </div>
                
                <div style="margin:30px 0">
                    <h3>أسباب إنهاء العمل:</h3>
                    <p style="background:#f9f9f9;padding:15px;border-radius:8px">${req.exit_reasons || 'غير محدد'}</p>
                    
                    <h3>بيئة العمل:</h3>
                    <p style="background:#f9f9f9;padding:15px;border-radius:8px">${req.work_environment || 'غير محدد'}</p>
                    
                    <h3>العلاقة مع المدير المباشر:</h3>
                    <p style="background:#f9f9f9;padding:15px;border-radius:8px">${req.manager_relationship || 'غير محدد'}</p>
                    
                    <h3>العلاقة مع الزملاء:</h3>
                    <p style="background:#f9f9f9;padding:15px;border-radius:8px">${req.coworker_relationship || 'غير محدد'}</p>
                    
                    ${req.suggestions ? `
                    <h3>الاقتراحات:</h3>
                    <p style="background:#f9f9f9;padding:15px;border-radius:8px">${req.suggestions}</p>
                    ` : ''}
                </div>
                
                <div style="margin-top:50px;text-align:center;color:var(--muted);font-size:12px">
                    <p>تاريخ الموافقة: ${this.formatDate(req.approved_at)}</p>
                    <p>مستشفى الملك عبدالعزيز © ${new Date().getFullYear()}</p>
                </div>
            </div>
        `;
        
        cert.style.display = 'block';
        window.print();
        cert.style.display = 'none';
    }
    
    viewDetails(index) {
        const req = this.requests[index];
        const modal = document.createElement('div');
        modal.style.cssText = `
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.5);display:flex;align-items:center;
            justify-content:center;z-index:1000;padding:20px;
        `;
        
        modal.innerHTML = `
            <div style="background:white;padding:30px;border-radius:12px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto">
                <h2 style="margin-top:0">تفاصيل الطلب #${req.id}</h2>
                
                <div style="margin:20px 0">
                    <p><strong>الحالة:</strong> <span class="status-badge status-${req.status}">${this.getStatusText(req.status)}</span></p>
                    <p><strong>تاريخ التقديم:</strong> ${this.formatDate(req.created_at || req.submitted_at)}</p>
                    ${req.approved_at ? `<p><strong>تاريخ الموافقة:</strong> ${this.formatDate(req.approved_at)}</p>` : ''}
                    ${req.rejected_at ? `<p><strong>تاريخ الرفض:</strong> ${this.formatDate(req.rejected_at)}</p>` : ''}
                </div>
                
                <h3>البيانات الأساسية</h3>
                <div style="background:#f9f9f9;padding:15px;border-radius:8px;margin-bottom:15px">
                    <p><strong>الاسم:</strong> ${req.employee_name}</p>
                    <p><strong>رقم الموظف:</strong> ${req.employee_number}</p>
                    <p><strong>الوظيفة:</strong> ${req.job_title}</p>
                    <p><strong>القسم:</strong> ${req.department}</p>
                </div>
                
                <h3>أسباب إنهاء العمل</h3>
                <p style="background:#f9f9f9;padding:15px;border-radius:8px">${req.exit_reasons || 'غير محدد'}</p>
                
                <div style="text-align:center;margin-top:20px">
                    <button class="btn btn-secondary" onclick="this.parentElement.parentElement.parentElement.remove()">إغلاق</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
    }
}

const app = new MyExitRequests();
</script>

<script src="../jS/signature.js"></script>
</body>
</html>
