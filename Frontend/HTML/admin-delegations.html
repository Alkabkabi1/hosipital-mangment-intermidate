<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/components.css">
    
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مستشفى الملك عبدالعزيز – إدارة التفويضات (أدمن)</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2B6CB0; --primary-600:#255b92;
  --bg:#f5f6f8; --surface:#fff; --text:#0f172a; --muted:#64748b; --border:#e5e7eb;
  --ok:#dcfce7; --warn:#fef3c7; --late:#fee2e2; --chip:#eef2ff;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',system-ui,Segoe UI,Arial,sans-serif}
.header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--border)}
.header .in{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:40px;height:40px;object-fit:contain}
.brand .tt h1{margin:0;font-size:18px;font-weight:800}
.brand .tt small{color:var(--muted)}
.btn{border:1px solid var(--border);border-radius:12px;padding:10px 14px;background:#fff;cursor:pointer;font-weight:800}
.btn.primary{background:var(--primary);border-color:transparent;color:#fff}
.btn.warn{background:#fff3cd;border-color:#ffe69c}
.btn.danger{background:#fee2e2;border-color:#fecaca}
.btn:active{transform:translateY(1px)}

.container{max-width:1200px;margin:18px auto;padding:0 16px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:16px;padding:12px}
.kpi .t{display:flex;justify-content:space-between;align-items:center}
.kpi .chip{background:var(--chip);border-radius:999px;padding:4px 10px;font-size:12px;color:#334155}
.kpi .n{font-size:28px;font-weight:800;margin-top:4px}

/* لوحة الإنشاء/التعديل */
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.06);margin-bottom:14px}
.card h3{margin:0 0 10px 0}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px}
.form-grid .full{grid-column:1/-1}
.input,.select,.textarea{height:46px;border:1px solid var(--border);border-radius:10px;padding:8px 10px;background:#fff}
.textarea{height:auto;min-height:90px}
.scopes{display:flex;flex-wrap:wrap;gap:8px}
.scope{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:6px 10px;background:#fff}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* فلاتر + جدول */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.table{width:100%;border-collapse:separate;border-spacing:0}
th,td{padding:10px;border-bottom:1px solid var(--border);text-align:right;vertical-align:top}
th{font-size:13px;color:#64748b}
.badge{padding:4px 10px;border-radius:999px;font-size:12px}
.b-act{background:var(--ok)} .b-exp{background:var(--late)} .b-soon{background:var(--warn)} .b-pend{background:var(--warn)} .b-rej{background:var(--late)}
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:900px){ .kpis{grid-template-columns:1fr 1fr} .form-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<header class="header">
  <div class="in">
    <div class="brand">
      <img src="public/image.png" alt="logo">
      <div class="tt"><h1>مستشفى الملك عبدالعزيز</h1><small>إدارة التفويضات (أدمن)</small></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="location.href='admin-dashboard.html'">رجوع</button>
    </div>
  </div>
</header>

<main class="container">
  <!-- KPIs -->
  <section class="kpis">
    <div class="kpi"><div class="t"><b>تفويضات فعّالة</b><span class="chip">Active</span></div><div class="n" id="kActive">0</div></div>
    <div class="kpi"><div class="t"><b>تنتهي خلال 3 أيام</b><span class="chip">Soon</span></div><div class="n" id="kSoon">0</div></div>
    <div class="kpi"><div class="t"><b>منتهية/موقوفة</b><span class="chip">Inactive</span></div><div class="n" id="kInactive">0</div></div>
    <div class="kpi"><div class="t"><b>إجمالي</b><span class="chip">All</span></div><div class="n" id="kAll">0</div></div>
  </section>

  <!-- إنشاء/تعديل -->
  <section class="card">
    <h3 id="formTitle">إنشاء تفويض</h3>
    <div class="form-grid">
      <div>
        <label>المفوِّض (From)</label>
        <input id="fFrom" class="input" placeholder="from@kauh.sa">
      </div>
      <div>
        <label>المفوَّض له (To)</label>
        <input id="fTo" class="input" placeholder="to@kauh.sa">
      </div>

      <div class="full">
        <label>الصلاحيات</label>
        <div id="scopeBox" class="scopes">
          <!-- أمثلة ثابتة -->
          <label class="scope"><input type="checkbox" value="approve_clearance"> اعتماد إخلاء طرف</label>
          <label class="scope"><input type="checkbox" value="approve_direct"> اعتماد مباشرة عمل</label>
          <label class="scope"><input type="checkbox" value="manage_delegations"> إدارة التفويضات</label>
          <label class="scope"><input type="checkbox" value="view_reports"> تقارير</label>
          <!-- مخصّص -->
          <span class="scope">
            <input id="fCustomScope" class="input" placeholder="صلاحية مخصّصة" style="height:36px;width:180px">
            <button class="btn" id="btnAddScope" type="button">+</button>
          </span>
        </div>
      </div>

      <div>
        <label>بداية الصلاحية</label>
        <input id="fValidFrom" class="input" type="date">
      </div>
      <div>
        <label>نهاية الصلاحية (اختياري)</label>
        <input id="fValidTo" class="input" type="date">
      </div>

      <div class="full">
        <label>ملاحظة (اختياري)</label>
        <textarea id="fNote" class="textarea" placeholder="أدخل أي تفاصيل إضافية"></textarea>
      </div>

      <div>
        <label>الحالة</label>
        <select id="fActive" class="select">
          <option value="true" selected>فعّال</option>
          <option value="false">موقوف</option>
        </select>
      </div>

      <div>
        <label>يتطلب قبول الموظف</label>
        <select id="fRequiresAcceptance" class="select">
          <option value="true" selected>نعم</option>
          <option value="false">لا</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button id="btnSave" class="btn primary">حفظ التفويض</button>
      <button id="btnReset" class="btn">تفريغ النموذج</button>
    </div>
  </section>

  <!-- فلاتر + جدول -->
  <section class="card">
    <h3>كل التفويضات</h3>
    <div class="filters">
      <select id="flStatus" class="select">
        <option value="">كل الحالات</option>
        <option value="active">فعّالة</option>
        <option value="soon">تنتهي ≤ 3 أيام</option>
        <option value="expired">منتهية/موقوفة</option>
      </select>
      <input id="flSearch" class="input" placeholder="بحث: بريد/صلاحية/ملاحظة">
      <button class="btn" onclick="draw()">تطبيق</button>
      <button class="btn" onclick="resetFilters()">مسح</button>
      <button class="btn primary" onclick="exportCSV()">تصدير CSV</button>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>#</th><th>المفوِّض</th><th>المفوَّض له</th><th>الصلاحيات</th><th>المدة</th><th>الحالة</th><th>حالة القبول</th><th>أُنشئ في</th><th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </section>
</main>

<script>
/* ===== حارس أدمن - MINIMAL AUTH ===== */
const authToken = localStorage.getItem('authToken');
const authUser = localStorage.getItem('authUser') ? JSON.parse(localStorage.getItem('authUser')) : null;

if(!authToken || !authUser){ 
  location.href='login.html'; 
}

function logout(){ 
  localStorage.removeItem('authUser'); 
  localStorage.removeItem('authToken');
  location.href='login.html'; 
}

/* ===== تنبيهات موجهة ===== */
function addNotif(toEmail, title, payload = {}){
  const list = NotificationStore.getAll();
  list.unshift({ title, time:new Date().toLocaleString('ar-SA'), unread:true, recipient:(toEmail||'').toLowerCase(), ...payload });
  NotificationStore.setAll(list);
}
function notifyAdmins(title, payload = {}){
  const admins = JSON.parse(localStorage.getItem('adminEmails') || '[]');
  admins.forEach(em => addNotif(em, title, payload));
}

/* ===== مخزن التفويضات ===== */
// Note: This page uses localStorage for now. For API-based delegations, see admin-delegations.js
let delegs = JSON.parse(localStorage.getItem('delegations')||'[]'); // {id,from,to,scopes[],note,active,bool,validFrom,validTo,createdAt,createdBy}
function persist(){ localStorage.setItem('delegations', JSON.stringify(delegs)); }

/* ===== أدوات ===== */
const THREE_D = 3*24*60*60*1000;
const todayStr = () => new Date().toISOString().slice(0,10);
function toDateVal(ts){ if(!ts) return ''; const d=new Date(ts); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); }
function fromDateVal(val){ if(!val) return null; const d = new Date(val+'T00:00:00'); return d.getTime(); }
function isActive(d){
  if(d.active===false) return false;
  if(d.validTo && d.validTo < Date.now()) return false;
  if(d.validFrom && d.validFrom > Date.now()) return false;
  return true;
}
function isSoon(d){
  if(!d.validTo) return false;
  const diff = d.validTo - Date.now();
  return diff>0 && diff <= THREE_D;
}
function fmt(ts){ return ts ? new Date(ts).toLocaleDateString('ar-SA',{year:'numeric',month:'short',day:'numeric'}) : '—'; }

/* ===== KPIs ===== */
function kpis(){
  const all = delegs.length;
  const act = delegs.filter(isActive).length;
  const soon= delegs.filter(isSoon).length;
  const inact = all - act;
  kActive.textContent=act; kSoon.textContent=soon; kInactive.textContent=inact; kAll.textContent=all;
}

/* ===== إنشاء/تعديل ===== */
let editingId = null;

btnAddScope.onclick = ()=> {
  const v = (fCustomScope.value||'').trim();
  if(!v) return;
  const tag = document.createElement('label');
  tag.className='scope';
  const inp = document.createElement('input');
  inp.type='checkbox'; inp.value=v; inp.checked=true;
  tag.appendChild(inp);
  tag.appendChild(document.createTextNode(' '+v));
  scopeBox.insertBefore(tag, scopeBox.lastElementChild);
  fCustomScope.value='';
};

function readScopes(){
  return Array.from(scopeBox.querySelectorAll('input[type="checkbox"]:checked')).map(i=>i.value);
}
function setScopes(values){
  const all = Array.from(scopeBox.querySelectorAll('input[type="checkbox"]'));
  all.forEach(i=> i.checked = values.includes(i.value));
}

function resetForm(){
  editingId=null;
  formTitle.textContent='إنشاء تفويض';
  fFrom.value=''; fTo.value='';
  setScopes([]);
  fValidFrom.value=todayStr(); fValidTo.value='';
  fNote.value='';
  fActive.value='true';
}
btnReset.onclick = resetForm;

function validateForm(){
  const from = fFrom.value.trim().toLowerCase();
  const to   = fTo.value.trim().toLowerCase();
  if(!from || !to){ alert('يرجى إدخال بريديْ المفوِّض والمفوَّض له.'); return null; }
  if(from===to){ alert('لا يمكن تفويض نفس الشخص لنفسه.'); return null; }
  const scopes = readScopes();
  if(scopes.length===0){ alert('اختر صلاحية واحدة على الأقل.'); return null; }
  return { from,to,scopes };
}

btnSave.onclick = ()=>{
  const base = validateForm(); if(!base) return;

  const obj = {
    id: editingId || Date.now(),
    from: base.from,
    to: base.to,
    scopes: base.scopes,
    note: fNote.value.trim() || null,
    active: fActive.value==='true',
    validFrom: fromDateVal(fValidFrom.value) || Date.now(),
    validTo: fromDateVal(fValidTo.value),
    createdAt: editingId ? (delegs.find(d=>d.id===editingId)?.createdAt || Date.now()) : Date.now(),
    createdBy: (authUser.email||'').toLowerCase()
  };

  if(editingId){
    const i = delegs.findIndex(d=>d.id===editingId);
    if(i>-1) delegs[i]=obj;
    persist();
    notifyAdmins(`تم تعديل تفويض #${obj.id}`, {refKind:'deleg', refId:obj.id});
    addNotif(obj.to, `تم تعديل تفويضك #${obj.id}`, {refKind:'deleg', refId:obj.id});
    alert('تم حفظ التعديل.');
    
    // Trigger storage event to notify other pages
    window.dispatchEvent(new StorageEvent('storage', {
      key: 'delegations',
      newValue: JSON.stringify(delegs)
    }));
  }else{
    delegs.push(obj); persist();
    notifyAdmins(`تم إنشاء تفويض #${obj.id}`, {refKind:'deleg', refId:obj.id});
    addNotif(obj.to, `تم تفويضك بصلاحيات جديدة (#${obj.id})`, {refKind:'deleg', refId:obj.id});
    addNotif(obj.from, `تم تسجيل تفويضك (#${obj.id})`, {refKind:'deleg', refId:obj.id});
    alert('تم إنشاء التفويض.');
    
    // Trigger storage event to notify other pages
    window.dispatchEvent(new StorageEvent('storage', {
      key: 'delegations',
      newValue: JSON.stringify(delegs)
    }));
  }
  resetForm(); kpis(); draw();
};

/* تحميل للتعديل */
function editRow(id){
  const d = delegs.find(x=>x.id===id); if(!d) return;
  editingId = id;
  formTitle.textContent = `تعديل تفويض #${id}`;
  fFrom.value=d.from; fTo.value=d.to;
  setScopes(d.scopes||[]);
  fValidFrom.value = toDateVal(d.validFrom);
  fValidTo.value   = toDateVal(d.validTo);
  fNote.value = d.note || '';
  fActive.value = d.active ? 'true':'false';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* إجراءات صف */
function toggleActive(id){
  const d = delegs.find(x=>x.id===id); if(!d) return;
  const wasActive = d.active;
  d.active = !d.active; persist(); kpis(); draw();
  const msg = d.active ? 'تم تفعيل' : 'تم إيقاف';
  notifyAdmins(`${msg} التفويض #${d.id}`, {refKind:'deleg', refId:d.id});
  addNotif(d.to, `${msg} تفويضك #${d.id}`, {refKind:'deleg', refId:d.id});
  
  // Trigger storage event to notify other pages if status changed significantly
  if (wasActive !== d.active) {
    window.dispatchEvent(new StorageEvent('storage', {
      key: 'delegations',
      newValue: JSON.stringify(delegs),
      oldValue: JSON.stringify(delegs.map(del => del.id === id ? {...del, active: wasActive} : del))
    }));
  }
}
function extendDays(id, days=7){
  const d = delegs.find(x=>x.id===id); if(!d) return;
  const oldValidTo = d.validTo;
  const base = d.validTo && d.validTo > Date.now() ? d.validTo : Date.now();
  d.validTo = base + days*24*60*60*1000;
  persist(); kpis(); draw();
  notifyAdmins(`تم تمديد تفويض #${d.id} ${days} يوم`, {refKind:'deleg', refId:d.id});
  addNotif(d.to, `تم تمديد تفويضك #${d.id} ${days} يوم`, {refKind:'deleg', refId:d.id});
  
  // Trigger storage event to notify other pages
  window.dispatchEvent(new StorageEvent('storage', {
    key: 'delegations',
    newValue: JSON.stringify(delegs),
    oldValue: JSON.stringify(delegs.map(del => del.id === id ? {...del, validTo: oldValidTo} : del))
  }));
}
function removeRow(id){
  if(!confirm('حذف التفويض نهائيًا؟')) return;
  const i = delegs.findIndex(x=>x.id===id); if(i<0) return;
  const d = delegs[i];
  delegs.splice(i,1); persist(); kpis(); draw();
  notifyAdmins(`تم حذف تفويض #${d.id}`, {refKind:'deleg', refId:d.id});
  addNotif(d.to, `تم حذف تفويضك #${d.id}`, {refKind:'deleg', refId:d.id});
  
  // Trigger storage event to notify other pages
  window.dispatchEvent(new StorageEvent('storage', {
    key: 'delegations',
    newValue: JSON.stringify(delegs),
    oldValue: JSON.stringify([...delegs, d])
  }));
}

/* فلاتر + جدول */
function resetFilters(){ flStatus.value=''; flSearch.value=''; draw(); }
function draw(){
  const status = flStatus.value;
  const q = (flSearch.value||'').toLowerCase().trim();

  let list = delegs.filter(d=>{
    if(status==='active'  && !isActive(d)) return false;
    if(status==='expired' &&  isActive(d)) return false;
    if(status==='soon'    && !isSoon(d)) return false;
    if(q){
      const hay = `${d.id} ${d.from||''} ${d.to||''} ${(d.scopes||[]).join(' ')} ${d.note||''}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  const tb = document.getElementById('rows'); tb.innerHTML='';
  if(list.length===0){
    tb.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#64748b">لا توجد بيانات</td></tr>`;
    return;
  }
  list.forEach(d=>{
    const badge = isActive(d) ? 'b-act' : 'b-exp';
    const soon  = isSoon(d) ? `<span class="badge b-soon">قرب الانتهاء</span>` : '';
    const scopes = (d.scopes||[]).join('، ');
    const dur = `${fmt(d.validFrom)} — ${fmt(d.validTo)}`;
    
    // حالة القبول
    let acceptanceStatus = '';
    if (d.status === 'rejected') {
      acceptanceStatus = '<span class="badge b-rej">مرفوض</span>';
    } else if (d.status === 'active') {
      acceptanceStatus = '<span class="badge b-act">مقبول</span>';
    } else if (d.status === 'pending') {
      acceptanceStatus = '<span class="badge b-pend">في الانتظار</span>';
    } else {
      acceptanceStatus = '<span class="badge">غير محدد</span>';
    }
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${d.id}</td>
      <td>${d.from||'-'}</td>
      <td>${d.to||'-'}</td>
      <td>${scopes||'—'}${d.note?'<br><small style="color:#64748b">'+d.note+'</small>':''}</td>
      <td>${dur}</td>
      <td><span class="badge ${badge}">${isActive(d)?'فعّال':'منتهي/موقوف'}</span> ${soon}</td>
      <td>${acceptanceStatus}</td>
      <td>${fmt(d.createdAt)}</td>
      <td class="row-actions">
        <button class="btn" onclick="editRow(${d.id})">تعديل</button>
        <button class="btn warn" onclick="extendDays(${d.id},7)">تمديد 7 أيام</button>
        <button class="btn" onclick="toggleActive(${d.id})">${isActive(d)?'إيقاف':'تفعيل'}</button>
        <button class="btn danger" onclick="removeRow(${d.id})">حذف</button>
      </td>
    `;
    tb.appendChild(tr);
  });
}

/* تصدير CSV */
function exportCSV(){
  const rows=[['ID','From','To','Scopes','Note','Active','ValidFrom','ValidTo','CreatedAt','CreatedBy']];
  delegs.forEach(d=>{
    rows.push([d.id||'',d.from||'',d.to||'',(d.scopes||[]).join('|'),d.note||'',isActive(d),d.validFrom||'',d.validTo||'',d.createdAt||'',d.createdBy||'']);
  });
  const csv=rows.map(r=>r.map(v=>String(v).includes(',')?`"${v}"`:v).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}), url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='delegations.csv'; a.click(); URL.revokeObjectURL(url);
}

/* تشغيل */
(function init(){
  // تعبئة تواريخ افتراضيًا
  fValidFrom.value = todayStr();
  kpis(); draw();
})();
</script>

<!-- Load required dependencies -->
<script src="../jS/notification-store.js"></script>
<script src="../jS/api-client.js"></script>
<script src="../jS/app-init.js"></script>
<!-- admin-delegations.js commented out - page uses inline script instead -->
<!-- <script src="../jS/admin-delegations.js"></script> -->
<script src="../jS/signature.js"></script>
</body>
</html>
