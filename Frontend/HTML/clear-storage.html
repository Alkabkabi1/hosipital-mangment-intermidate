<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تنظيف التخزين المحلي - مستشفى الملك عبدالعزيز</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/base.css">
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #2B6CB0;
      margin-bottom: 20px;
      font-size: 28px;
    }
    
    .message {
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .status {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    
    .status.loading {
      background: #fef3c7;
      color: #92400e;
    }
    
    .status.success {
      background: #d1fae5;
      color: #065f46;
    }
    
    .btn {
      background: #2B6CB0;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn:hover {
      background: #1e4976;
      transform: translateY(-2px);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .details {
      background: #f3f4f6;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: right;
      font-size: 14px;
    }
    
    .details ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0 0;
    }
    
    .details li {
      padding: 5px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    
    .details li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🧹</div>
    <h1>تنظيف التخزين المحلي</h1>
    <p class="message">
      سيتم مسح جميع البيانات المخزنة محلياً في المتصفح. هذا يشمل:
    </p>
    
    <div class="details">
      <strong>البيانات التي سيتم مسحها:</strong>
      <ul>
        <li>✓ معلومات تسجيل الدخول</li>
        <li>✓ الطلبات المحفوظة محلياً</li>
        <li>✓ الإشعارات المخزنة</li>
        <li>✓ التفويضات المحلية</li>
        <li>✓ جميع البيانات المؤقتة</li>
      </ul>
    </div>
    
    <div id="status" class="status loading" style="display: none;">
      جاري تنظيف التخزين المحلي...
    </div>
    
    <button id="clearBtn" class="btn" onclick="clearStorage()">
      ابدأ التنظيف
    </button>
  </div>

  <script>
    function clearStorage() {
      const statusDiv = document.getElementById('status');
      const clearBtn = document.getElementById('clearBtn');
      
      // Show loading
      statusDiv.style.display = 'block';
      statusDiv.className = 'status loading';
      statusDiv.textContent = 'جاري تنظيف التخزين المحلي...';
      clearBtn.disabled = true;
      
      // Get count before clearing
      const itemCount = localStorage.length;
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        keys.push(localStorage.key(i));
      }
      
      // Clear after a short delay for UX
      setTimeout(() => {
        try {
          localStorage.clear();
          
          // Show success
          statusDiv.className = 'status success';
          statusDiv.textContent = `✅ تم مسح ${itemCount} عنصر بنجاح!`;
          
          console.log('🧹 Cleared localStorage items:', keys);
          
          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
          
        } catch (error) {
          statusDiv.className = 'status';
          statusDiv.style.background = '#fee2e2';
          statusDiv.style.color = '#991b1b';
          statusDiv.textContent = '❌ حدث خطأ أثناء التنظيف: ' + error.message;
          clearBtn.disabled = false;
        }
      }, 500);
    }
    
    // Log current storage status
    console.log('📊 Current localStorage items:', localStorage.length);
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      console.log(`  - ${key}`);
    }
  </script>
<script src="../jS/signature.js"></script>
</body>
</html>
