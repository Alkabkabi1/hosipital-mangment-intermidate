<!DOCTYPE html><html lang="ar" dir="rtl"><head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/components.css">
    
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>الموظفون – الأدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#2B6CB0;--bg:#f5f6f8;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#e5e7eb}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',system-ui,Segoe UI,Arial,sans-serif}
.header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border)}
.header .in{max-width:1100px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.btn{border:1px solid var(--border);border-radius:10px;padding:8px 12px;background:#fff;font-weight:800;cursor:pointer}
.btn:hover{background:var(--primary);color:#fff}
.container{max-width:1100px;margin:16px auto;padding:0 16px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.input,.select{height:40px;border:1px solid var(--border);border-radius:10px;padding:8px 10px;background:#fff}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px}
.table{width:100%;border-collapse:separate;border-spacing:0} th,td{padding:10px;border-bottom:1px solid var(--border);text-align:right}
th{font-size:13px;color:#64748b}
.badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:12px;font-weight:600}
.badge-active{background:#d1fae5;color:#065f46}
.badge-inactive{background:#fee2e2;color:#991b1b}
.btn-sm{padding:4px 8px;font-size:12px;border:none;border-radius:6px;cursor:pointer}
</style></head><body>
<header class="header"><div class="in">
  <div><b>مستشفى الملك عبدالعزيز</b> – <small>الموظفون</small></div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="location.href='admin-dashboard.html'">رجوع</button>
  </div>
</div></header>

<main class="container">
  <section class="card">
    <div class="filters">
      <input id="q" class="input" placeholder="بحث: اسم/بريد/قسم/وظيفة">
      <select id="dept" class="select"><option value="">جميع الأقسام</option></select>
      <button class="btn" onclick="draw()">تطبيق</button>
      <button class="btn" onclick="resetF()">مسح</button>
      <button class="btn" onclick="loadEmployees()">تحديث</button>
    </div>

    <table class="table">
      <thead><tr>
        <th>#</th><th>الاسم</th><th>البريد</th><th>القسم</th><th>المسمى</th><th>جوال</th><th>الحالة</th><th>الإجراءات</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </section>
</main>

<script>
const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
if (!authUser) {
  window.location.href = 'login.html';
}

let employees = [];
const tableBody = document.getElementById('rows');
const deptSelect = document.getElementById('dept');
const searchInput = document.getElementById('q');

function setTableLoading(message = 'جاري تحميل بيانات الموظفين...') {
  if (tableBody) {
    tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#64748b">${message}</td></tr>`;
  }
}

// Fetch employees from database API
async function loadEmployees() {
  try {
    setTableLoading('جاري تحميل البيانات من قاعدة البيانات...');
    
    // Use apiClient if available, otherwise direct fetch
    let response;
    if (window.apiClient && typeof window.apiClient.getAllEmployeesAdmin === 'function') {
      response = await window.apiClient.getAllEmployeesAdmin();
    } else {
      const authToken = localStorage.getItem('authToken');
      const res = await fetch('http://localhost:3037/api/admin/employees', {
        headers: {
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json'
        }
      });
      
      if (!res.ok) {
        throw new Error(`فشل تحميل الموظفين: ${res.status}`);
      }
      
      response = await res.json();
    }
    
    // Extract data from response { success: true, data: [] }
    const data = response?.data || response;
    employees = Array.isArray(data) ? data : [];
    
    console.log('✅ Loaded employees from database:', employees.length);
    populateDepartments();
    draw();
  } catch (error) {
    console.error('Employees fetch error:', error);
    setTableLoading('حدث خطأ في تحميل الموظفين: ' + (error.message || error));
  }
}

function populateDepartments() {
  if (!deptSelect) return;
  // Extract department names - handle both dept and department_name properties
  const uniqueDepartments = [...new Set(
    employees.map(e => e.dept || e.department_name || e.departmentName).filter(Boolean)
  )].sort();
  deptSelect.innerHTML = '<option value="">جميع الأقسام</option>';
  uniqueDepartments.forEach(department => {
    const option = document.createElement('option');
    option.value = department;
    option.textContent = department;
    deptSelect.appendChild(option);
  });
}

function draw() {
  if (!tableBody) return;

  const query = (searchInput?.value || '').toLowerCase().trim();
  const departmentFilter = deptSelect?.value || '';

  const list = employees.filter(employee => {
    const empDept = employee.dept || employee.department_name || employee.departmentName || '';
    if (departmentFilter && empDept !== departmentFilter) {
      return false;
    }

    if (query) {
      const haystack = [
        employee.employeeNumber || employee.employee_number || employee.id,
        employee.name,
        employee.email,
        empDept,
        employee.title || employee.position,
        employee.mobile || employee.phone
      ].join(' ').toLowerCase();

      if (!haystack.includes(query)) {
        return false;
      }
    }

    return true;
  });

  if (list.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#64748b">لا توجد بيانات متاحة</td></tr>';
    return;
  }

  tableBody.innerHTML = list.map((employee, index) => {
    const empId = employee.id || employee.employee_id || index + 1;
    const empNumber = employee.employeeNumber || employee.employee_number || empId;
    const empName = employee.name || [employee.first_name, employee.last_name].filter(Boolean).join(' ') || 'غير محدد';
    const empEmail = employee.email || '-';
    const empDept = employee.dept || employee.department_name || employee.departmentName || '-';
    const empTitle = employee.title || employee.position || '-';
    const empMobile = employee.mobile || employee.phone || '-';
    const empStatus = employee.status || employee.isActive ? 'نشط' : 'غير نشط';
    const isActive = employee.status === 'active' || employee.isActive;
    
    return `
    <tr>
      <td>${empNumber}</td>
      <td>${empName}</td>
      <td>${empEmail}</td>
      <td>${empDept}</td>
      <td>${empTitle}</td>
      <td>${empMobile}</td>
      <td><span class="badge ${isActive ? 'badge-active' : 'badge-inactive'}">${empStatus}</span></td>
      <td>
        <button class="btn btn-sm" onclick="viewEmployeeProfile(${empId})" style="background:#2B6CB0;color:white;padding:4px 8px;font-size:12px;margin-left:4px">الملف الشخصي</button>
        <button class="btn btn-sm" onclick="deleteEmployee(${empId})" style="background:#ef4444;color:white;padding:4px 8px;font-size:12px">حذف</button>
      </td>
    </tr>
  `;
  }).join('');
}

// Delete employee function
async function deleteEmployee(employeeId) {
  if (!confirm('هل أنت متأكد من حذف هذا الموظف؟')) {
    return;
  }

  try {
    const authToken = localStorage.getItem('authToken');
    const response = await fetch(`http://localhost:3037/api/admin/users/${employeeId}`, {
      method: 'DELETE',
      headers: {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json'
      }
    });

    if (!response.ok) {
      throw new Error(`فشل حذف الموظف: ${response.status}`);
    }

    alert('تم حذف الموظف بنجاح');
    loadEmployees(); // Reload the list
  } catch (error) {
    console.error('Delete error:', error);
    alert('حدث خطأ في حذف الموظف: ' + error.message);
  }
}

function resetF() {
  if (searchInput) {
    searchInput.value = '';
  }
  if (deptSelect) {
    deptSelect.value = '';
  }
  draw();
}

// Navigate to employee profile
function viewEmployeeProfile(employeeId) {
  window.location.href = `employee-profile.html?employeeId=${employeeId}`;
}

window.draw = draw;
window.resetF = resetF;
window.deleteEmployee = deleteEmployee;
window.viewEmployeeProfile = viewEmployeeProfile;

function initEmployeesPage() {
  loadEmployees();
}

// Initialize when page loads
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initEmployeesPage);
} else {
  initEmployeesPage();
}
</script>

<!-- JavaScript Files with proper loading order -->
<!-- Phase 1: Foundation scripts -->
<script src="../jS/dependency-guard.js"></script>
<script src="../jS/error-handler.js"></script>
<script src="../jS/notification-store.js"></script>
<script src="../jS/notification-utils.js"></script>

<!-- Phase 2: Core application scripts -->
<script src="../jS/app-init.js"></script>
<script src="../jS/api-client.js"></script>
<script src="../jS/role-permissions.js"></script>
<script src="../jS/form-validation-utils.js"></script>

<script>
// Wait for dependencies before initializing
window.waitForDependencies(() => {
  console.log('✅ Admin employees: All dependencies loaded');
}, ['apiClient', 'NotificationStore', 'resolveFrontendPath']);
</script>
<script src="../jS/signature.js"></script>
</body>
</html>
