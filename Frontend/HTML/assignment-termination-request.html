<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/unified-form-styles.css">
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مستشفى الملك عبدالعزيز – إنهاء تكليف</title>

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* =================== ألوان وهوية عامة =================== */
    :root {
      --primary: #2B6CB0;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #6b7280;
      --border: #e5e7eb;

      /* حقول فاتحة + حدود سوداء */
      --field-bg: #ffffff;
      --field-text: #0f172a;
      --field-border: #000000;
      --field-placeholder: #6b7280;
      --field-focus: rgba(0, 0, 0, .15);

      /* مربعات الأقسام */
      --qbox-radius: 16px;
      --qbox-border: #e5e7eb;
      --qbox-shadow: 0 6px 18px rgba(0, 0, 0, .06);

      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', system-ui, Segoe UI, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none
    }

    /* =================== هيدر =================== */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 0
    }

    .header .in {
      max-width: 1200px;
      margin: auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .brand img {
      width: 36px;
      height: 36px;
      object-fit: contain
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .brand small {
      color: var(--muted);
      display: block;
      margin-top: 2px
    }

    .back {
      margin-right: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600
    }

    .back:hover {
      background: #f9fafb
    }

    /* =================== المحتوى =================== */
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 16px
    }

    /* =================== نموذج =================== */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--qbox-border);
      border-radius: var(--qbox-radius);
      box-shadow: var(--qbox-shadow);
      padding: 24px;
      margin-bottom: 20px
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 16px 0;
      color: var(--primary)
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px
    }

    .form-grid.single {
      grid-template-columns: 1fr
    }

    .form-group {
      display: flex;
      flex-direction: column
    }

    .form-group.full {
      grid-column: 1 / -1
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text)
    }

    .required {
      color: var(--danger);
    }

    .input,
    .select,
    .textarea {
      background: var(--field-bg);
      border: 2px solid var(--field-border);
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      color: var(--field-text);
      font-family: 'Tajawal', system-ui;
      transition: border-color 0.2s, box-shadow 0.2s
    }

    .textarea {
      min-height: 120px;
      resize: vertical
    }

    .input::placeholder,
    .textarea::placeholder {
      color: var(--field-placeholder)
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #000;
      box-shadow: 0 0 0 3px var(--field-focus);
      outline: none;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: none
    }

    /* أزرار عامة */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      font-family: 'Tajawal', system-ui;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff
    }

    .btn-primary:hover {
      background: #1e40af
    }

    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border)
    }

    .btn-outline:hover {
      background: var(--border);
      color: var(--text)
    }

    /* موبايل */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr
      }

      .actions {
        flex-direction: column
      }

      .btn {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <!-- هيدر -->
  <header class="header">
    <div class="in">
      <div class="brand">
        <img src="public/image.png" alt="شعار">
        <div>
          <h1>مستشفى الملك عبدالعزيز</h1>
          <small>قرار إنهاء تكليف</small>
        </div>
      </div>
      <button class="back" data-action="go-back">رجوع</button>
    </div>
  </header>

  <!-- المحتوى -->
  <main class="container">

    <!-- قسم بيانات الموظف -->
    <section class="form-section">
      <h2 class="section-title">بيانات الموظف</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>الاسم الأول <span class="required">*</span></label>
          <input class="input" id="empFirstName" placeholder="الاسم الأول" required>
        </div>
        <div class="form-group">
          <label>الاسم الثاني <span class="required">*</span></label>
          <input class="input" id="empSecondName" placeholder="الاسم الثاني" required>
        </div>
        <div class="form-group">
          <label>الاسم الثالث <span class="required">*</span></label>
          <input class="input" id="empThirdName" placeholder="الاسم الثالث" required>
        </div>
        <div class="form-group">
          <label>الرقم الوظيفي <span class="required">*</span></label>
          <input class="input" id="empJobNo" placeholder="123456" required>
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني <span class="required">*</span></label>
          <input class="input" id="empEmail" type="email" placeholder="name@kauh.sa" required>
        </div>
        <div class="form-group">
          <label>القسم <span class="required">*</span></label>
          <input class="input" id="empDept" placeholder="مثال: الموارد البشرية" required>
        </div>
        <div class="form-group">
          <label>المسمى الوظيفي <span class="required">*</span></label>
          <input class="input" id="empTitle" placeholder="مثال: موظف إداري" required>
        </div>
        <div class="form-group">
          <label>رقم الجوال <span class="required">*</span></label>
          <input class="input" id="empMobile" type="tel" placeholder="05xxxxxxxx" required>
        </div>
      </div>
    </section>

    <!-- قسم تفاصيل التكليف الحالي -->
    <section class="form-section">
      <h2 class="section-title">تفاصيل التكليف الحالي</h2>
      <div class="form-grid single">
        <div class="form-group">
          <label>الدور/المهمة في التكليف <span class="required">*</span></label>
          <input class="input" id="assignmentRole" placeholder="مثال: مدير مشروع" required>
        </div>
        <div class="form-group">
          <label>قسم التكليف</label>
          <input class="input" id="assignmentDepartment" placeholder="مثال: قسم العمليات">
        </div>
        <div class="form-group">
          <label>تاريخ بدء التكليف</label>
          <input class="input" id="assignmentStartDate" type="date">
        </div>
      </div>
    </section>

    <!-- قسم تفاصيل الإنهاء -->
    <section class="form-section">
      <h2 class="section-title">تفاصيل الإنهاء والعودة</h2>
      <div class="form-grid single">
        <div class="form-group">
          <label>تاريخ الإنهاء <span class="required">*</span></label>
          <input class="input" id="terminationDate" type="date" required>
        </div>
        <div class="form-group">
          <label>تاريخ العودة</label>
          <input class="input" id="returnDate" type="date">
        </div>
        <div class="form-group">
          <label>القسم للعودة إليه</label>
          <input class="input" id="returnToDepartment" placeholder="مثال: الموارد البشرية">
        </div>
        <div class="form-group">
          <label>المنصب للعودة إليه</label>
          <input class="input" id="returnToPosition" placeholder="مثال: موظف إداري">
        </div>
        <div class="form-group full">
          <label>سبب الإنهاء <span class="required">*</span></label>
          <textarea class="textarea" id="terminationReason" required minlength="5" placeholder="اشرح سبب إنهاء التكليف (على الأقل 5 أحرف)"></textarea>
        </div>
        <div class="form-group full">
          <label>تقييم الأداء خلال التكليف</label>
          <textarea class="textarea" id="assignmentPerformance" placeholder="تقييم أداء الموظف خلال فترة التكليف (اختياري)"></textarea>
        </div>
        <div class="form-group full">
          <label>الدروس المستفادة</label>
          <textarea class="textarea" id="lessonsLearned" placeholder="ما تم تعلمه من هذا التكليف"></textarea>
        </div>
        <div class="form-group full">
          <label>ملاحظات إضافية</label>
          <textarea class="textarea" id="requestNotes"></textarea>
        </div>
      </div>
    </section>

    <!-- أزرار الإجراءات -->
    <section class="form-section">
      <div class="actions">
        <button class="btn btn-outline" data-action="cancel-form">إلغاء</button>
        <button class="btn btn-primary" id="btnSubmit" data-action="submit-termination">إرسال الطلب</button>
      </div>
    </section>
  </main>

  <!-- JavaScript Files with proper loading order -->
  <!-- Phase 1: Foundation scripts -->
  <script src="../jS/dependency-guard.js"></script>
  <script src="../jS/error-handler.js"></script>
  <script src="../jS/notification-store.js"></script>
  <script src="../jS/notification-utils.js"></script>

  <!-- Phase 2: Core application scripts -->
  <script src="../jS/app-init.js"></script>
  <script src="../jS/api-client.js"></script>
  <script src="../jS/role-permissions.js"></script>
  <script src="../jS/form-validation-utils.js"></script>

  <!-- Phase 3: Page-specific scripts -->
  <script src="../jS/assignment-termination-request-inline.js"></script>
  <script src="../jS/signature.js"></script>
</body>
</html>
