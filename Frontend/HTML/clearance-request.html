<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/unified-form-styles.css">
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🏥</text></svg>">
  <title>مستشفى الملك عبدالعزيز – طلب إخلاء طرف</title>

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* =================== ألوان وهوية عامة =================== */
    :root {
      --primary: #2B6CB0;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #6b7280;
      --border: #e5e7eb;

      /* حقول فاتحة + حدود سوداء */
      --field-bg: #ffffff;
      --field-text: #0f172a;
      --field-border: #000000;
      /* حدود سوداء */
      --field-placeholder: #6b7280;
      --field-focus: rgba(0, 0, 0, .15);

      /* مربعات الأقسام */
      --qbox-radius: 16px;
      --qbox-border: #e5e7eb;
      --qbox-shadow: 0 6px 18px rgba(0, 0, 0, .06);

      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', system-ui, Segoe UI, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none
    }

    /* =================== هيدر =================== */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 0
    }

    .header .in {
      max-width: 1200px;
      margin: auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .brand img {
      width: 36px;
      height: 36px;
      object-fit: contain
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .brand small {
      color: var(--muted);
      display: block;
      margin-top: 2px
    }

    .back {
      margin-right: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600
    }

    .back:hover {
      background: #f9fafb
    }

    /* =================== المحتوى =================== */
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 16px
    }

    /* =================== نموذج =================== */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--qbox-border);
      border-radius: var(--qbox-radius);
      box-shadow: var(--qbox-shadow);
      padding: 24px;
      margin-bottom: 20px
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 16px 0;
      color: var(--primary)
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px
    }

    .form-grid.single {
      grid-template-columns: 1fr
    }

    .form-group {
      display: flex;
      flex-direction: column
    }

    .form-group.full {
      grid-column: 1 / -1
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text)
    }

    .input,
    .select,
    .textarea {
      background: var(--field-bg);
      border: 2px solid var(--field-border);
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      color: var(--field-text);
      font-family: 'Tajawal', system-ui;
      transition: border-color 0.2s, box-shadow 0.2s
    }

    .textarea {
      min-height: 120px;
      resize: vertical
    }

    .input::placeholder,
    .textarea::placeholder {
      color: var(--field-placeholder)
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #000;
      box-shadow: 0 0 0 3px var(--field-focus);
    }

    input[type="email"] {
      direction: ltr;
      text-align: left
    }

    input[type="tel"],
    input[data-ltr] {
      direction: ltr;
      text-align: left
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: none
    }

    /* أزرار عامة */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff
    }

    .btn-primary:hover {
      background: #1e40af
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border)
    }

    .btn-outline:hover {
      background: var(--border);
      color: var(--text)
    }

    /* موبايل */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr
      }

      .actions {
        flex-direction: column
      }

      .btn {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <!-- هيدر -->
  <header class="header">
    <div class="in">
      <div class="brand">
        <img src="public/image.png" alt="شعار">
        <div>
          <h1>مستشفى الملك عبدالعزيز</h1>
          <small>طلب إخلاء طرف</small>
        </div>
      </div>
      <button class="back" data-action="go-back">رجوع</button>
    </div>
  </header>

  <!-- المحتوى -->
  <main class="container">
    <!-- قسم بيانات الموظف -->
    <section class="form-section">
      <h2 class="section-title">بيانات الموظف</h2>
      <div class="form-grid boxed" id="empGrid">
        <div class="form-group">
          <label>الاسم الأول *</label>
          <input class="input" id="empFirstName" placeholder="الاسم الأول" data-validate="arabic" required>
        </div>
        <div class="form-group">
          <label>الاسم الثاني *</label>
          <input class="input" id="empSecondName" placeholder="الاسم الثاني" data-validate="arabic" required>
        </div>
        <div class="form-group">
          <label>الاسم الثالث *</label>
          <input class="input" id="empThirdName" placeholder="الاسم الثالث" data-validate="arabic" required>
        </div>
        <div class="form-group">
          <label>الرقم الوظيفي *</label>
          <input class="input" id="empJobNo" data-ltr placeholder="123456" data-validate="employee_id" required>
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني *</label>
          <input class="input" id="empEmail" type="email" placeholder="name@kauh.sa" required>
        </div>
        <div class="form-group">
          <label>القسم *</label>
          <input class="input" id="empDept" placeholder="مثال: الموارد البشرية" required>
        </div>
        <div class="form-group">
          <label>المسمى الوظيفي *</label>
          <input class="input" id="empTitle" placeholder="مثال: موظف إداري" required>
        </div>
        <div class="form-group">
          <label>رقم الجوال *</label>
          <input class="input" id="empMobile" type="tel" inputmode="tel" placeholder="05xxxxxxxx" data-validate="phone" required>
        </div>
      </div>
    </section>

    <!-- قسم تفاصيل الإخلاء -->
    <section class="form-section">
      <h2 class="section-title">تفاصيل طلب الإخلاء</h2>
      <div class="form-grid single">
        <div class="form-group">
          <label>نوع الإخلاء *</label>
          <select class="select" id="clearanceType" required>
            <option value="">اختر نوع الإخلاء</option>
            <option value="end_of_service">إنهاء الخدمة</option>
            <option value="end_mid_service">إنهاء في منتصف الخدمة</option>
          </select>
        </div>
        <div class="form-group">
          <label>سبب الإخلاء *</label>
          <select class="select" id="clearReason" required disabled>
            <option value="">اختر نوع الإخلاء أولاً</option>
          </select>
          <input class="input" id="otherReason" placeholder="اكتب السبب هنا" style="display: none; margin-top: 8px;">
        </div>
        <div class="form-group">
          <label>آخر يوم عمل *</label>
          <input class="input" id="lastWorkDay" type="date" data-validate="future_date,working_day" required>
        </div>
        <div class="form-group">
          <label>رقم المستند الذي يستند إليه الإخلاء *</label>
          <input class="input" id="documentNumber" data-ltr placeholder="رقم المستند" required>
        </div>
        <div class="form-group full">
          <label>المرفقات (اختياري)</label>
          <input class="input" id="attachments" type="file" multiple>
        </div>
      </div>
    </section>

    <!-- أزرار الإجراءات -->
    <section class="form-section">
      <div class="actions">
        <button class="btn btn-outline" data-action="cancel-form">إلغاء</button>
        <button class="btn btn-primary" id="btnSubmit" data-action="submit-clearance">إرسال الطلب</button>
      </div>
    </section>
  </main>

  <!-- JavaScript Files with proper loading order -->
  <!-- Phase 1: Foundation scripts -->
  <script src="../jS/dependency-guard.js"></script>
  <script src="../jS/error-handler.js"></script>
  <script src="../jS/notification-store.js"></script>
  <script src="../jS/notification-utils.js"></script>

  <!-- Phase 2: Core application scripts -->
  <script src="../jS/app-init.js"></script>
  <script src="../jS/api-client.js"></script>
  <script src="../jS/role-permissions.js"></script>
  <script src="../jS/form-validation-utils.js"></script>

  <!-- Phase 3: Page-specific scripts -->
  <script src="../jS/clearance-request-inline.js"></script>
<script src="../jS/signature.js"></script>
</body>
</html>
