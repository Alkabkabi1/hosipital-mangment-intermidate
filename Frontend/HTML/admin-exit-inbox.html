<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/components.css">
    
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🏥</text></svg>">
    <title>وارد طلبات إنهاء العمل – مستشفى الملك عبدالعزيز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/styles.css"/>

    <style>
        :root{
            --primary:#2B6CB0; --primary-600:#255b92;
            --bg:#f5f6f8; --surface:#fff; --text:#0f172a; --muted:#64748b;
            --border:#e5e7eb; --ok:#16a34a; --danger:#dc2626; --chip:#eef2ff;
            --warn:#f59e0b; --good:#16a34a; --bad:#ef4444;
            --shadow:0 8px 24px rgba(2,6,23,.06), 0 1px 1px rgba(2,6,23,.04);
            --radius:18px;
        }
        *{box-sizing:border-box}
        body{margin:0;background:var(--bg);color:var(--text);font-family:'Tajawal',system-ui,Segoe UI,Arial}
        a{color:inherit;text-decoration:none}

        /* هيدر */
        .header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--border)}
        .header .in{max-width:1200px;margin:auto;display:flex;align-items:center;gap:16px;padding:10px 16px}
        .brand{display:flex;align-items:center;gap:10px}
        .brand img{width:44px;height:44px;object-fit:contain}
        .brand .title{font-weight:800;line-height:1}
        .brand small{color:var(--muted);display:block;margin-top:2px}
        .nav-quick{margin-right:auto;display:flex;gap:8px}
        .quick{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:#fff}
        .bell{position:relative;padding:8px;border:1px solid var(--border);border-radius:12px;background:#fff}
        .badge{position:absolute;top:-6px;left:-6px;background:#ef4444;color:#fff;border-radius:999px;padding:2px 6px;font-size:11px}
        .avatar{width:38px;height:38px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-weight:800}

        /* الحاوية */
        .container{max-width:1200px;margin:18px auto;padding:0 16px}

        /* الجدول */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .table thead {
            background: var(--bg);
        }

        .table th {
            padding: 16px;
            text-align: right;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .table td {
            padding: 16px;
            font-size: 14px;
            color: var(--text);
            border-bottom: 1px solid #f1f5f9;
        }

        .table tbody tr {
            transition: background 0.2s;
        }

        .table tbody tr:hover {
            background: #f8fafc;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Status badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 999px;
            gap: 4px;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-submitted {
            background: #dbeafe;
            color: #1e40af;
        }

        /* Action buttons */
        .action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action:hover {
            background: #f8fafc;
            border-color: var(--primary);
        }

        .action.primary {
            background: var(--primary);
            border-color: transparent;
            color: white;
        }

        .action.primary:hover {
            background: var(--primary-600);
        }

        .action.success {
            background: var(--good);
            border-color: transparent;
            color: white;
        }

        .action.success:hover {
            background: #15803d;
        }

        .action.danger {
            background: var(--bad);
            border-color: transparent;
            color: white;
        }

        .action.danger:hover {
            background: #dc2626;
        }

        /* Filters */
        .filters {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .filter-group {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--text);
        }

        .filter-group select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
        }

        .filter-group select:focus {
            border-color: var(--primary);
            outline: none;
        }

        @media (max-width: 768px) {
            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .table {
                font-size: 12px;
            }
            
            .table th,
            .table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<header class="header">
  <div class="in">
    <div class="brand">
      <img src="public/image.png" alt="logo">
      <div>
        <div class="title">مستشفى الملك عبدالعزيز</div>
        <small>وارد طلبات إنهاء العمل</small>
      </div>
    </div>
    <div class="nav-quick">
      <a class="quick" href="admin-dashboard.html">🏠 الرئيسية</a>
      <a class="quick" href="admin-direct-inbox.html">وارد مباشرة</a>
      <a class="quick" href="admin-clearance-inbox.html">وارد إخلاء طرف</a>
      <a class="quick" href="admin-certificate-inbox.html">📋 شهادات الخبرة</a>
    </div>
    <div class="bell" title="الإشعارات">🔔</div>
    <div class="avatar" title="الملف الشخصي">A</div>
  </div>
</header>

<main class="container">
    <!-- Filters -->
    <div class="filters">
        <div class="filter-group">
            <label>فلترة حسب الحالة:</label>
            <select id="statusFilter">
                <option value="">جميع الحالات</option>
                <option value="submitted">مقدمة</option>
                <option value="approved">معتمدة</option>
                <option value="rejected">مرفوضة</option>
            </select>
            
            <label>فلترة حسب القسم:</label>
            <select id="departmentFilter">
                <option value="">جميع الأقسام</option>
                <option value="التمريض">التمريض</option>
                <option value="الطب">الطب</option>
                <option value="الصيدلة">الصيدلة</option>
                <option value="المختبرات">المختبرات</option>
                <option value="الأشعة">الأشعة</option>
                <option value="الطوارئ">الطوارئ</option>
                <option value="العناية المركزة">العناية المركزة</option>
                <option value="الجراحة">الجراحة</option>
                <option value="النساء والولادة">النساء والولادة</option>
                <option value="الأطفال">الأطفال</option>
                <option value="الطب النفسي">الطب النفسي</option>
                <option value="العلاج الطبيعي">العلاج الطبيعي</option>
                <option value="التغذية">التغذية</option>
                <option value="الإدارة">الإدارة</option>
                <option value="المالية">المالية</option>
                <option value="الموارد البشرية">الموارد البشرية</option>
                <option value="تقنية المعلومات">تقنية المعلومات</option>
                <option value="الأمن والسلامة">الأمن والسلامة</option>
                <option value="الصيانة">الصيانة</option>
                <option value="النظافة">النظافة</option>
            </select>
            
            <button class="action primary" onclick="loadRequests()">🔄 تحديث</button>
        </div>
    </div>

    <!-- Requests Table -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>رقم الطلب</th>
                    <th>اسم الموظف</th>
                    <th>رقم الموظف</th>
                    <th>القسم</th>
                    <th>الوظيفة</th>
                    <th>تاريخ التقديم</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="requestsTableBody">
                <tr>
                    <td colspan="8" style="text-align: center; padding: 40px; color: var(--muted);">
                        جاري التحميل...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="../jS/admin-exit-inbox.js"></script>
<script src="../jS/signature.js"></script>
</body>
</html>
