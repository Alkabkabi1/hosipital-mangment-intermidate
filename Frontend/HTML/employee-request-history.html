<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/components.css">
    
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🏥</text></svg>">
<title>سجل الطلبات – مستشفى الملك عبدالعزيز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../CSS/base.css">
<style>
:root{
  --primary:#2B6CB0; --primary-600:#255b92;
  --bg:#f5f6f8; --surface:#fff; --text:#0f172a; --muted:#64748b;
  --border:#e5e7eb; --soft:#f1f5f9; --ok:#dcfce7; --warn:#fef3c7; --late:#fee2e2; --chip:#eef2ff;
}
*{box-sizing:border-box}
body{margin:0;background:#f5f6f8;color:#0f172a;font-family:'Tajawal',system-ui,Segoe UI,Arial,sans-serif}

/* الهيدر */
.header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--border)}
.header .in{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.group{display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:36px;height:36px;object-fit:contain}
.brand h1{margin:0;font-size:20px;font-weight:800}
.brand small{color:var(--muted)}
.btn{border:1px solid var(--border);background:#fff;border-radius:12px;height:40px;padding:0 12px;cursor:pointer;font-weight:800}
.btn:hover{background:#fafafa}
.quick{border:1px solid var(--border);background:#fff;border-radius:12px;height:40px;padding:0 12px;cursor:pointer;font-weight:800;text-decoration:none;color:inherit;display:inline-flex;align-items:center}
.quick:hover{background:#fafafa}

/* أفاتار */
.avatar{position:relative;display:inline-grid;place-items:center;width:40px;height:40px;border-radius:999px;background:var(--primary);color:#fff;font-weight:800;cursor:pointer}
.avatar:hover{background:var(--primary-600)}

/* المحتوى */
.container{max-width:1200px;margin:18px auto;padding:0 16px}

/* Filters */
.filters{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 10px 26px rgba(0,0,0,.06)}
.filter-group{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.filter-group label{font-weight:600;color:var(--text)}
.filter-group select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff}

/* جدول */
.card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 26px rgba(0,0,0,.06);overflow:hidden}
.table{width:100%;border-collapse:separate;border-spacing:0}
th,td{padding:12px;border-bottom:1px solid var(--border);text-align:right}
th{font-size:13px;color:#6b7280;background:#f8fafc}
tr:hover td{background:#fafbfc}
.badge{padding:4px 10px;border-radius:999px;font-size:12px}
.status-pending{background:var(--warn);color:#92400e}
.status-submitted{background:var(--warn);color:#92400e}
.status-approved{background:var(--ok);color:#065f46}
.status-rejected{background:var(--late);color:#991b1b}
.status-completed{background:#e0e7ff;color:#3730a3}
.btn-sm{border:1px solid var(--border);background:#fff;border-radius:10px;padding:6px 10px;cursor:pointer;font-weight:800}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 10px 26px rgba(0,0,0,.06)}
.stat-value{font-size:32px;font-weight:800;margin-bottom:4px}
.stat-label{color:var(--muted);font-size:14px}
</style>
</head>
<body>

<header class="header">
  <div class="in">
    <div class="group">
      <div class="brand">
        <img src="public/image.png" alt="logo">
        <div>
          <h1>مستشفى الملك عبدالعزيز</h1>
          <small>سجل الطلبات</small>
        </div>
      </div>
    </div>

    <div class="group">
      <a class="quick" href="employee-dashboard.html">🏠 الرئيسية</a>
      <div id="avatar" class="avatar" title="الملف الشخصي">S</div>
      <a class="quick" data-action="logout" style="cursor:pointer;">تسجيل الخروج</a>
    </div>
  </div>
</header>

<main class="container">
  <!-- Statistics -->
  <section class="stats">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statPending">0</div>
      <div class="stat-label">معلقة</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statApproved">0</div>
      <div class="stat-label">معتمدة</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statRejected">0</div>
      <div class="stat-label">مرفوضة</div>
    </div>
  </section>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>فلترة حسب النوع:</label>
      <select id="typeFilter">
        <option value="">جميع الأنواع</option>
        <option value="clearance">إخلاء طرف</option>
        <option value="onboarding">مباشرة عمل</option>
        <option value="delegation">تفويض</option>
        <option value="certificate">شهادة تعريف</option>
        <option value="experience">شهادة خبرة</option>
        <option value="exit">إنهاء العمل</option>
        <option value="leave_request">طلب إجازة</option>
      </select>
      
      <label>فلترة حسب الحالة:</label>
      <select id="statusFilter">
        <option value="">جميع الحالات</option>
        <option value="pending">معلقة</option>
        <option value="submitted">مقدمة</option>
        <option value="approved">معتمدة</option>
        <option value="rejected">مرفوضة</option>
        <option value="completed">مكتملة</option>
      </select>
      
      <button class="btn" onclick="applyFilters()" style="margin-left:auto;">🔄 تحديث</button>
    </div>
  </div>

  <!-- Requests Table -->
  <div class="card">
    <table class="table">
      <thead>
        <tr>
          <th>رقم الطلب</th>
          <th>نوع الطلب</th>
          <th>الحالة</th>
          <th>تاريخ الإنشاء</th>
          <th>تاريخ التحديث</th>
          <th>تفاصيل</th>
        </tr>
      </thead>
      <tbody id="requestsTableBody">
        <tr>
          <td colspan="6" style="text-align:center;color:#6b7280;padding:20px;">
            جاري التحميل...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<!-- External JavaScript files -->
<script src="../jS/dependency-guard.js"></script>
<script src="../jS/error-handler.js"></script>
<script src="../jS/notification-store.js"></script>
<script src="../jS/notification-utils.js"></script>
<script src="../jS/app-init.js"></script>
<script src="../jS/api-client.js"></script>
<script src="../jS/employee-request-history.js"></script>
<script src="../jS/signature.js"></script>
</body>
</html>
