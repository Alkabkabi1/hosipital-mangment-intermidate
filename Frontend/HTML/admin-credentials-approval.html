<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الشهادات والتراخيص - مستشفى الملك عبدالعزيز</title>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/components.css">
    <link rel="stylesheet" href="../CSS/modern-enhancements.css">
    <link rel="stylesheet" href="../CSS/visual-enhancements.css">
    <link rel="stylesheet" href="../CSS/professional-design.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2B6CB0;
            --primary-dark: #245a95;
            --primary-light: #4a96e0;
            --secondary: #3b82f6;
            --success: #16a34a;
            --success-light: #10b981;
            --danger: #dc2626;
            --danger-light: #ef4444;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --info: #3b82f6;
            --bg: #f5f6f8;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e5e7eb;
            --shadow: 0 8px 24px rgba(2,6,23,.06), 0 1px 1px rgba(2,6,23,.04);
            --shadow-lg: 0 10px 15px -3px rgba(43, 108, 176, 0.1), 0 4px 6px -2px rgba(43, 108, 176, 0.05);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #2B6CB0, #3b82f6);
            color: white;
            padding: 24px;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-white {
            background: white;
            color: var(--primary);
        }
        
        .btn-white:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 24px auto;
            padding: 0 24px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .stat-icon {
            font-size: 48px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }
        
        .stat-icon.primary { background: linear-gradient(135deg, #e0efff, #baddff); }
        .stat-icon.success { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
        .stat-icon.warning { background: linear-gradient(135deg, #fef3c7, #fde68a); }
        
        .stat-content h3 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .stat-content .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
        }
        
        /* Filters */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .filter-label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: white;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .filter-btn:hover, .filter-btn.active {
            border-color: #2B6CB0;
            background: #2B6CB0;
            color: white;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #2B6CB0;
        }
        
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        /* Credentials List */
        .credentials-list {
            display: grid;
            gap: 24px;
        }
        
        .employee-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .employee-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .employee-header {
            background: linear-gradient(135deg, #f0f7ff, #e0efff);
            padding: 24px;
            border-bottom: 3px solid #2B6CB0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        
        .employee-header:hover {
            background: linear-gradient(135deg, #dbeafe, #bae6fd);
        }
        
        .employee-info {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .employee-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2B6CB0, #4a96e0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 800;
        }
        
        .employee-details h3 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .employee-meta {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .employee-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .employee-badge {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-arrow {
            font-size: 20px;
            transition: transform 0.3s ease;
            display: inline-block;
        }
        
        .employee-card.collapsed .toggle-arrow {
            transform: rotate(-90deg);
        }
        
        .credentials-content {
            padding: 24px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
            opacity: 1;
        }
        
        .employee-card.collapsed .credentials-content {
            max-height: 0;
            padding: 0 24px;
            opacity: 0;
        }
        
        .credential-section {
            margin-bottom: 24px;
        }
        
        .credential-section:last-child {
            margin-bottom: 0;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }
        
        .credential-item {
            background: #f9fafb;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        
        .credential-item:hover {
            border-color: #2B6CB0;
            box-shadow: 0 4px 8px rgba(43, 108, 176, 0.15);
        }
        
        .credential-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .credential-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .credential-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .credential-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .credential-actions {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-approve {
            background: linear-gradient(135deg, #16a34a, #10b981);
            color: white;
        }
        
        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(22, 163, 74, 0.4);
        }
        
        .btn-reject {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
        }
        
        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(220, 38, 38, 0.4);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        
        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .empty-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .empty-text {
            font-size: 16px;
            color: var(--text-muted);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: #2B6CB0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Type Badges */
        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .type-bachelor { background: #dbeafe; color: #1e3a8a; }
        .type-master { background: #fce7f3; color: #831843; }
        .type-phd { background: #ede9fe; color: #5b21b6; }
        .type-diploma { background: #fef3c7; color: #92400e; }
        .type-certificate { background: #e0efff; color: #1e3a8a; }
        .type-training { background: #dcfce7; color: #065f46; }
        .type-nursing { background: #dbeafe; color: #1e3a8a; }
        .type-medical { background: #fce7f3; color: #831843; }
        .type-professional { background: #e0efff; color: #1e3a8a; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <span style="font-size: 32px;">🎓</span>
                <h1>إدارة الشهادات والتراخيص</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-white" onclick="location.reload()">
                    🔄 تحديث
                </button>
                <a href="admin-dashboard.html" class="btn btn-white">
                    ← العودة للوحة التحكم
                </a>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon primary">📋</div>
                <div class="stat-content">
                    <h3>إجمالي الطلبات المعلقة</h3>
                    <div class="stat-number" id="statTotal">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon success">🎓</div>
                <div class="stat-content">
                    <h3>الشهادات المعلقة</h3>
                    <div class="stat-number" id="statCertificates">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon warning">🪪</div>
                <div class="stat-content">
                    <h3>التراخيص المعلقة</h3>
                    <div class="stat-number" id="statLicenses">0</div>
                </div>
            </div>
        </div>
        
        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <span class="filter-label">الفلترة:</span>
                <button class="filter-btn active" data-filter="all" onclick="filterCredentials('all')">
                    الكل
                </button>
                <button class="filter-btn" data-filter="certificates" onclick="filterCredentials('certificates')">
                    الشهادات فقط
                </button>
                <button class="filter-btn" data-filter="licenses" onclick="filterCredentials('licenses')">
                    التراخيص فقط
                </button>
            </div>
            <div class="filter-group">
                <span class="filter-label">البطاقات:</span>
                <button class="filter-btn" onclick="expandAllCards()" style="border-color: #10b981; color: #10b981;">
                    ▼ فتح الكل
                </button>
                <button class="filter-btn" onclick="collapseAllCards()" style="border-color: #64748b; color: #64748b;">
                    ◀ طي الكل
                </button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="بحث عن موظف أو شهادة أو ترخيص..." onkeyup="searchCredentials()">
                <span class="search-icon">🔍</span>
            </div>
        </div>
        
        <!-- Credentials List -->
        <div class="credentials-list" id="credentialsList">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color: var(--text-muted); font-weight: 600;">جاري تحميل البيانات...</p>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="../jS/app-init.js"></script>
    <script src="../jS/api-client.js"></script>
    <script src="../jS/confirmation-dialog.js"></script>
    <script src="../jS/admin-credentials-approval.js"></script>
<script src="../jS/signature.js"></script>
</body>
</html>
