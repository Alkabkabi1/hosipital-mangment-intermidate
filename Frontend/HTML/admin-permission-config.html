<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصلاحيات - نظام إدارة المستشفى</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <style>
        .permission-config-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .config-header {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .role-chip {
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .role-chip:hover {
            border-color: #2196F3;
            background: #E3F2FD;
        }

        .role-chip.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        .permissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .resource-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .resource-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #333;
        }

        .select-all-toggle {
            padding: 0.5rem 1rem;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .select-all-toggle:hover {
            background: #2196F3;
            color: white;
        }

        .permission-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .permission-item:hover {
            background: #f9f9f9;
        }

        .permission-checkbox {
            width: 20px;
            height: 20px;
            margin-left: 0.75rem;
            cursor: pointer;
        }

        .permission-label {
            flex: 1;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .permission-name {
            font-weight: 500;
            color: #333;
        }

        .permission-desc {
            font-size: 0.875rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .action-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .action-read { background: #E3F2FD; color: #1976D2; }
        .action-create { background: #E8F5E9; color: #388E3C; }
        .action-update { background: #FFF3E0; color: #F57C00; }
        .action-delete { background: #FFEBEE; color: #D32F2F; }
        .action-approve { background: #F3E5F5; color: #7B1FA2; }
        .action-manage { background: #E0F2F1; color: #00796B; }

        .save-button {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 3rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }

        .save-button:hover {
            background: #45a049;
            box-shadow: 0 6px 16px rgba(76, 175, 80, 0.5);
            transform: translateX(-50%) translateY(-2px);
        }

        .save-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2196F3;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2196F3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .create-perm-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .create-btn {
            padding: 0.75rem 2rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .create-btn:hover {
            background: #45a049;
            box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
        }

        .close-modal {
            font-size: 2rem;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }

        .close-modal:hover {
            color: #333;
        }

        .form-row {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn-cancel {
            padding: 0.75rem 1.5rem;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit {
            padding: 0.75rem 1.5rem;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-submit:hover {
            background: #1976D2;
        }

        .perm-actions {
            display: flex;
            gap: 0.5rem;
        }

        .edit-btn, .delete-btn {
            padding: 0.25rem 0.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .edit-btn {
            background: #FFF3E0;
            color: #F57C00;
        }

        .delete-btn {
            background: #FFEBEE;
            color: #D32F2F;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <div class="permission-config-container">
        <div class="config-header">
            <h1>⚙️ إدارة صلاحيات الأدوار</h1>
            <p>تعديل الصلاحيات المخصصة لكل دور في النظام</p>

            <div class="role-selector" id="roleSelector">
                <!-- Role chips will be populated here -->
            </div>

            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-value" id="totalPermissions">0</div>
                    <div class="stat-label">إجمالي الصلاحيات</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="selectedPermissions">0</div>
                    <div class="stat-label">الصلاحيات المفعلة</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="changesCount">0</div>
                    <div class="stat-label">التغييرات غير المحفوظة</div>
                </div>
            </div>
        </div>

        <div class="create-perm-section">
            <h3 style="margin: 0 0 1rem 0;">إدارة الصلاحيات</h3>
            <button class="create-btn" onclick="openCreateModal()">
                ➕ إنشاء صلاحية جديدة
            </button>
        </div>

        <div class="permissions-grid" id="permissionsGrid">
            <!-- Permission cards will be populated here -->
        </div>

        <button class="save-button" id="saveButton" onclick="saveChanges()">
            💾 حفظ التغييرات
        </button>
    </div>

    <!-- Create/Edit Permission Modal -->
    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">إنشاء صلاحية جديدة</h2>
                <button class="close-modal" onclick="closePermissionModal()">&times;</button>
            </div>

            <form id="permissionForm">
                <input type="hidden" id="editPermissionId">

                <div class="form-row">
                    <label class="form-label" for="permResource">المورد (Resource)</label>
                    <select class="form-select" id="permResource" required>
                        <option value="">-- اختر المورد --</option>
                        <option value="clearance">إخلاء الطرف (clearance)</option>
                        <option value="delegation">التفويض (delegation)</option>
                        <option value="onboarding">التوظيف (onboarding)</option>
                        <option value="employee">الموظفين (employee)</option>
                        <option value="role">الأدوار (role)</option>
                        <option value="system">النظام (system)</option>
                    </select>
                </div>

                <div class="form-row">
                    <label class="form-label" for="permAction">الإجراء (Action)</label>
                    <select class="form-select" id="permAction" required>
                        <option value="">-- اختر الإجراء --</option>
                        <option value="read">عرض (read)</option>
                        <option value="create">إنشاء (create)</option>
                        <option value="update">تعديل (update)</option>
                        <option value="delete">حذف (delete)</option>
                        <option value="approve">موافقة (approve)</option>
                        <option value="reject">رفض (reject)</option>
                        <option value="manage">إدارة (manage)</option>
                        <option value="view_all">عرض الكل (view_all)</option>
                        <option value="view_own">عرض الخاص (view_own)</option>
                        <option value="assign">تعيين (assign)</option>
                        <option value="configure">تكوين (configure)</option>
                    </select>
                </div>

                <div class="form-row">
                    <label class="form-label" for="permName">اسم الصلاحية (سيتم إنشاؤه تلقائياً)</label>
                    <input type="text" class="form-input" id="permName" readonly>
                </div>

                <div class="form-row">
                    <label class="form-label" for="permDescription">الوصف (اختياري)</label>
                    <input type="text" class="form-input" id="permDescription" 
                           placeholder="مثال: صلاحية عرض طلبات إخلاء الطرف">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closePermissionModal()">إلغاء</button>
                    <button type="submit" class="btn-submit" id="submitBtn">إنشاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../jS/api-client.js"></script>
    <script src="../jS/app-init.js"></script>
    <script src="../jS/role-permissions.js"></script>
    <script src="../jS/token-debugger.js"></script>
    <script src="../jS/permission-config.js"></script>

    <script>
        // Embedded authentication check - MINIMAL VERSION
        const authToken = localStorage.getItem('authToken');
        const authUser = localStorage.getItem('authUser');
        
        if (!authToken || !authUser || authUser === 'undefined' || authUser === 'null') {
            window.location.href = 'login.html';
        }
        
        // Simple role check - no strict validation
        try {
            const user = JSON.parse(authUser);
            const userRole = (user.role || '').toLowerCase();
            const userRoles = user.roles || [];
            
            // Allow admin, manager, hr to access (minimal check)
            const isAdmin = userRole === 'admin' || userRoles.includes('ADMIN');
            
            if (!isAdmin) {
                console.warn('Non-admin user attempted access');
                // Don't redirect - just log warning
            }
        } catch (error) {
            console.error('Auth parse error:', error);
        }
    </script>
<script src="../jS/signature.js"></script>
</body>
</html>
