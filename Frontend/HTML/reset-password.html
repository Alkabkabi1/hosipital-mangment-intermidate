<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/components.css">
    
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#2B6CB0;
      --bg:#f5f6f8; --surface:#ffffff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
    }
    .login-wrapper{
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--bg); padding:24px;
      font-family:'Tajawal', system-ui, -apple-system, Segoe UI, Arial, sans-serif; color:var(--text);
    }
    .login-card{
      width:100%; max-width:520px; background:var(--surface);
      border:1px solid var(--border); border-radius:18px; padding:40px;
      box-shadow:0 12px 40px rgba(0,0,0,.08); text-align:center;
    }
    .logo{ display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
    .logo img{ width:72px; height:72px; object-fit:contain; background:#f3f4f6; border-radius:12px; padding:10px; box-shadow:0 4px 18px rgba(0,0,0,.06); }
    .login-title{ margin:12px 0 20px 0; font-size:26px; font-weight:800; }
    .login-form{ text-align:right; margin-top:6px; }
    .form-group{ margin-bottom:14px; }
    .form-group label{ display:block; font-size:14px; color:var(--muted); margin-bottom:6px; }
    .input{
      width:100%; background:#fff; border:1px solid var(--border); border-radius:10px;
      height:48px; padding:12px 14px; font-size:16px; outline:none; transition:border-color .2s, box-shadow .2s;
    }
    .input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(43,108,176,.15); }
    .btn{ width:100%; border:0; border-radius:10px; padding:12px 14px; font-weight:700; cursor:pointer; }
    .btn-primary{ background:var(--primary); color:#fff; }
    .links{ margin-top:14px; font-size:14px; color:var(--muted); display:flex; gap:8px; justify-content:center; }
    .links a{ color:inherit; text-decoration:underline; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo"><img src="public/image.png" alt="شعار"></div>
      <h2 class="login-title">إعادة تعيين كلمة المرور</h2>

      <form id="newPassForm" class="login-form">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="email" class="input" required>
        </div>
        <div class="form-group">
          <label>رمز التحقق</label>
          <input type="text" id="code" class="input" placeholder="123456" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور الجديدة</label>
          <input type="password" id="pass1" class="input" required>
        </div>
        <div class="form-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="pass2" class="input" required>
        </div>
        <button type="submit" class="btn btn-primary">حفظ</button>
      </form>

      <div class="links" style="margin-top:12px;">
        <a href="login.html">العودة لتسجيل الدخول</a>
      </div>
    </div>
  </div>

<script>
  // تعبئة البريد من الرابط
  const params = new URLSearchParams(location.search);
  const prefill = params.get('email');
  if(prefill) document.getElementById('email').value = prefill;

  document.getElementById('newPassForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const code  = document.getElementById('code').value.trim();
    const p1    = document.getElementById('pass1').value;
    const p2    = document.getElementById('pass2').value;

    if(p1 !== p2){ alert('كلمتا المرور غير متطابقتين'); return; }

    const saved = JSON.parse(localStorage.getItem('pwdReset') || 'null');
    if(!saved || saved.email !== email){ alert('لا يوجد طلب لهذا البريد.'); return; }
    if(Date.now() > saved.expiresAt){ alert('انتهت صلاحية الرمز. اطلب رمزًا جديدًا.'); return; }
    if(saved.code !== code){ alert('رمز غير صحيح.'); return; }

    // ملاحظة: في الإنتاج يتم التحديث على السيرفر.
    // هنا فقط نزيل الرمز ونرجّع المستخدم لتسجيل الدخول.
    localStorage.removeItem('pwdReset');
    alert('تم تحديث كلمة المرور.');
    location.href = 'login.html';
  });
</script>
  <!-- JavaScript Files -->
  <script src="../jS/form-validation-utils.js"></script>
  <script src="../jS/api-client.js"></script>
  <script src="../jS/app-init.js"></script>
  <script src="../jS/reset-password.js"></script>
<script src="../jS/signature.js"></script>
</body>
</html>
