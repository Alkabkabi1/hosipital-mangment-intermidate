<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../CSS/design-system.css">
    <link rel="stylesheet" href="../CSS/base-updated.css">
    <link rel="stylesheet" href="../CSS/unified-form-styles.css">
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🏥</text></svg>">
  <title>مستشفى الملك عبدالعزيز – خطاب تذاكر طيران</title>

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2B6CB0;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --field-bg: #ffffff;
      --field-text: #0f172a;
      --field-border: #000000;
      --field-placeholder: #6b7280;
      --field-focus: rgba(0, 0, 0, .15);
      --qbox-radius: 16px;
      --qbox-border: #e5e7eb;
      --qbox-shadow: 0 6px 18px rgba(0, 0, 0, .06);
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', system-ui, Segoe UI, Arial, sans-serif;
    }

    a { color: inherit; text-decoration: none }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 0
    }

    .header .in {
      max-width: 1200px;
      margin: auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .brand img {
      width: 36px;
      height: 36px;
      object-fit: contain
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .brand small {
      color: var(--muted);
      display: block;
      margin-top: 2px
    }

    .back {
      margin-right: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600
    }

    .back:hover {
      background: #f9fafb
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 16px
    }

    .form-section {
      background: var(--surface);
      border: 1px solid var(--qbox-border);
      border-radius: var(--qbox-radius);
      box-shadow: var(--qbox-shadow);
      padding: 24px;
      margin-bottom: 20px
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 16px 0;
      color: var(--primary)
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px
    }

    .form-grid.single {
      grid-template-columns: 1fr
    }

    .form-group {
      display: flex;
      flex-direction: column
    }

    .form-group.full {
      grid-column: 1 / -1
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text)
    }

    .input,
    .select,
    .textarea {
      background: var(--field-bg);
      border: 2px solid var(--field-border);
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      color: var(--field-text);
      font-family: 'Tajawal', system-ui;
      transition: border-color 0.2s, box-shadow 0.2s
    }

    .textarea {
      min-height: 100px;
      resize: vertical
    }

    .input::placeholder,
    .textarea::placeholder {
      color: var(--field-placeholder)
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: #000;
      box-shadow: 0 0 0 3px var(--field-focus);
      outline: none
    }

    /* Table for passengers */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px
    }

    table th,
    table td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: right
    }

    table th {
      background: #f3f4f6;
      font-weight: 700;
      font-size: 14px
    }

    table input {
      width: 100%;
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: 4px
    }

    .btn-add {
      background: #10b981;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px
    }

    .btn-add:hover {
      background: #059669
    }

    .btn-remove {
      background: #ef4444;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 24px
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff
    }

    .btn-primary:hover {
      background: #1e40af
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary)
    }

    .btn-outline:hover {
      background: var(--primary);
      color: #fff
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr
      }
      
      .actions {
        flex-direction: column
      }

      .btn {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <!-- هيدر -->
  <header class="header">
    <div class="in">
      <div class="brand">
        <img src="public/image.png" alt="شعار">
        <div>
          <h1>مستشفى الملك عبدالعزيز</h1>
          <small>خطاب طلب تذاكر الخطوط السعودية</small>
        </div>
      </div>
      <button class="back" data-action="go-back">رجوع</button>
    </div>
  </header>

  <!-- المحتوى -->
  <main class="container">
    <!-- معلومات الخطاب -->
    <section class="form-section">
      <h2 class="section-title">📋 معلومات الخطاب</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>تاريخ الخطاب *</label>
          <input class="input" id="requestDate" type="date" required>
        </div>
        <div class="form-group">
          <label>التاريخ الهجري</label>
          <input class="input" id="letterHijriDate" placeholder="مثال: 15/05/1446هـ">
        </div>
      </div>
    </section>

    <!-- بيانات الموظف -->
    <section class="form-section">
      <h2 class="section-title">👤 بيانات الموظف</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>اسم الموظف *</label>
          <input class="input" id="employeeName" placeholder="الاسم الكامل" required>
        </div>
        <div class="form-group">
          <label>الرقم الوظيفي *</label>
          <input class="input" id="employeeNumber" placeholder="أرقام فقط" data-ltr required>
        </div>
        <div class="form-group">
          <label>القسم / الإدارة *</label>
          <input class="input" id="employeeDepartment" placeholder="القسم" required>
        </div>
        <div class="form-group">
          <label>رقم التواصل</label>
          <input class="input" id="contactNumber" type="tel" placeholder="05XXXXXXXX" data-ltr>
        </div>
      </div>
    </section>

    <!-- مسار الرحلة -->
    <section class="form-section">
      <h2 class="section-title">✈️ مسار الرحلة</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>من (المدينة الأولى) *</label>
          <input class="input" id="routeOrigin" placeholder="مثال: جدة" required>
        </div>
        <div class="form-group">
          <label>محطة 1 (اختياري)</label>
          <input class="input" id="routeStop1" placeholder="مثال: الرياض">
        </div>
        <div class="form-group">
          <label>محطة 2 (اختياري)</label>
          <input class="input" id="routeStop2" placeholder="مثال: الدمام">
        </div>
        <div class="form-group">
          <label>إلى (المدينة الأخيرة) *</label>
          <input class="input" id="routeReturn" placeholder="مثال: جدة" required>
        </div>
        <div class="form-group">
          <label>تاريخ بداية السفر *</label>
          <input class="input" id="travelStartDate" type="date" required>
        </div>
        <div class="form-group">
          <label>درجة السفر</label>
          <select class="select" id="travelClass">
            <option value="الدرجة السياحية (المخفضة)">الدرجة السياحية (المخفضة)</option>
            <option value="درجة رجال الأعمال">درجة رجال الأعمال</option>
            <option value="الدرجة الأولى">الدرجة الأولى</option>
          </select>
        </div>
      </div>
    </section>

    <!-- قائمة المسافرين -->
    <section class="form-section">
      <h2 class="section-title">👥 قائمة المسافرين</h2>
      <table id="passengersTable">
        <thead>
          <tr>
            <th style="width: 50px;">#</th>
            <th>اسم المسافر</th>
            <th>تاريخ الميلاد</th>
            <th>ملاحظات</th>
            <th style="width: 60px;">إجراء</th>
          </tr>
        </thead>
        <tbody id="passengersBody">
          <!-- Rows added dynamically -->
        </tbody>
      </table>
      <button type="button" class="btn-add" id="addPassenger">➕ إضافة مسافر</button>
    </section>

    <!-- ملاحظات إضافية -->
    <section class="form-section">
      <h2 class="section-title">📝 ملاحظات إضافية</h2>
      <div class="form-grid single">
        <div class="form-group">
          <label>تحية الختام</label>
          <input class="input" id="closingGreeting" placeholder="مع أطيب تحياتي،" value="مع أطيب تحياتي،">
        </div>
        <div class="form-group">
          <label>اسم مدير الموارد البشرية</label>
          <input class="input" id="hrDirectorName" placeholder="أ / بدر عبيد الله العازمي" value="أ / بدر عبيد الله العازمي">
        </div>
        <div class="form-group">
          <label>ملاحظات أخرى</label>
          <textarea class="textarea" id="additionalNotes" placeholder="أي ملاحظات إضافية"></textarea>
        </div>
      </div>
    </section>

    <!-- أزرار الإجراءات -->
    <div class="actions">
      <button type="button" class="btn btn-primary" id="submitBtn">
        📤 تقديم الطلب
      </button>
      <button type="button" class="btn btn-outline" onclick="window.location.href='employee-dashboard.html'">
        ❌ إلغاء
      </button>
    </div>
  </main>

<!-- Phase 1: Foundation -->
<script src="../jS/dependency-guard.js"></script>
<script src="../jS/error-handler.js"></script>
<script src="../jS/notification-store.js"></script>
<script src="../jS/notification-utils.js"></script>

<!-- Phase 2: Core -->
<script src="../jS/app-init.js"></script>
<script src="../jS/api-client.js"></script>
<script src="../jS/role-permissions.js"></script>

<!-- Phase 3: Form Script -->
<script src="../jS/employee-saudi-airlines-letter.js"></script>

<script>
window.waitForDependencies(() => {
  console.log('✅ Initializing airlines ticket form...');
  
  // Auto-populate today's date
  const today = new Date().toISOString().split('T')[0];
  const requestDateField = document.getElementById('requestDate');
  if (requestDateField && !requestDateField.value) {
    requestDateField.value = today;
  }

  // Initialize the form class
  if (typeof SaudiAirlinesLetter !== 'undefined') {
    new SaudiAirlinesLetter();
  }
}, ['apiClient', 'NotificationUtils']);
</script>

<script src="../jS/signature.js"></script>
</body>
</html>
